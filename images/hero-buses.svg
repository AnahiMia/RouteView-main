<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#F0F7F4"/>

  <!-- Ruta punteada -->
  <path d="M60 320 C 220 320, 220 180, 380 180 C 540 180, 540 100, 700 100"
