  <!-- Paradas -->
  <circle cx="60" cy="320" r="8" fill="#2563EB"/>
  <circle cx="380" cy="180" r="8" fill="#0E9F6E"/>
  <circle cx="700" cy="100" r="8" fill="#2563EB"/>

  <!-- Bus principal -->
  <g transform="translate(190,210)">
    <rect x="0" y="20" width="220" height="90" rx="18" fill="#0E9F6E"/>
    <rect x="0" y="20" width="220" height="34" rx="18" fill="#0B7A55"/>
    <rect x="18" y="60" width="42" height="34" rx="4" fill="#E6F4EF"/>
    <rect x="70" y="60" width="42" height="34" rx="4" fill="#E6F4EF"/>
    <rect x="122" y="60" width="42" height="34" rx="4" fill="#E6F4EF"/>
    <rect x="174" y="60" width="30" height="34" rx="4" fill="#E6F4EF"/>
    <circle cx="46" cy="118" r="16" fill="#1B3A2F"/>
    <circle cx="46" cy="118" r="7" fill="#CBD5E1"/>
    <circle cx="174" cy="118" r="16" fill="#1B3A2F"/>
    <circle cx="174" cy="118" r="7" fill="#CBD5E1"/>
  </g>

  <!-- Nube minimal -->
  <g fill="#DCEFE7">
    <circle cx="620" cy="70" r="22"/>
